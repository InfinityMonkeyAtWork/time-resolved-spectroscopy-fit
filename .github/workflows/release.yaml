name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Verify tag points to commit in main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit is not reachable from origin/main."
            echo "Ref: $GITHUB_REF  Sha: $GITHUB_SHA"
            exit 1
          fi
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package + dev tools
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"
      - name: Run tests
        run: .venv/bin/pytest -q
      - name: Run ruff
        run: |
          .venv/bin/ruff check .
          .venv/bin/ruff format --check .
      - name: Run mypy
        run: .venv/bin/mypy
      - name: Run pyright
        run: .venv/bin/pyright
      - name: Run deptry
        run: .venv/bin/deptry .
      - name: Build package
        run: .venv/bin/python -m build
      - name: Check package metadata
        run: .venv/bin/twine check dist/*
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/*

  publish:
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/trspecfit
      #url: https://test.pypi.org/project/trspecfit/
    permissions:
      actions: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        #with:
        #  repository-url: https://test.pypi.org/legacy/
