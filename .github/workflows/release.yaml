name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Verify tag points to commit in main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit is not reachable from origin/main."
            echo "Ref: $GITHUB_REF  Sha: $GITHUB_SHA"
            exit 1
          fi
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install package + dev tools
        # [jax] included so the JAX-backend parity tests run and pyright
        # can resolve the jax imports in eval_jax.py, matching ci.yaml.
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e ".[dev,jax]"
      - name: Run tests
        run: .venv/bin/pytest -q -m ""
      - name: Run ruff
        run: |
          .venv/bin/ruff check .
          .venv/bin/ruff format --check .
      - name: Run mypy
        run: .venv/bin/mypy --no-incremental
      - name: Run pyright
        run: .venv/bin/pyright
      - name: Run deptry
        run: .venv/bin/deptry .
      - name: Build package
        run: .venv/bin/python -m build
      - name: Check package metadata
        run: .venv/bin/twine check dist/*
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dist
          path: dist/*

  publish:
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/trspecfit
      #url: https://test.pypi.org/project/trspecfit/
    permissions:
      actions: read
      id-token: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        #with:
        #  repository-url: https://test.pypi.org/legacy/
