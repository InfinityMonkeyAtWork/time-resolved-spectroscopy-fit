# Profile models: depth-dependent variation of XPS spectral parameters
# (available functions: src/trspecfit/functions/profile.py)
#
# Profile naming convention:
#   - Each top-level key is the profile model name, which must match the energy
#     model parameter name it describes (e.g. GLP_01_A for amplitude).
#   - Components are named and numbered like energy/time components.
#   - Resulting lmfit parameter names:
#       <profile_model_name>_<component_name>_<par_name>
#     e.g.  GLP_01_A_pExpDecay_01_A,  GLP_01_x0_pLinear_01_m
#
# Load with:
#   file.add_par_profile("2D", "GLP_01_A", "models_profile.yaml", ["GLP_01_A"])
#   file.add_par_profile("2D", "GLP_01_x0", "models_profile.yaml", ["GLP_01_x0"])

# ----------------------------------------------------------------------------
# IMFP-weighted amplitude profile (applied to GLP_01_A)
# Physical meaning: the XPS signal from layer at depth z contributes with
# weight exp(-z / tau_imfp), where tau_imfp is the inelastic mean free path.
# A(z) = GLP_01_A_pExpDecay_01_A * exp(-z / GLP_01_A_pExpDecay_01_tau)
# ----------------------------------------------------------------------------
GLP_01_A:
    pExpDecay:
        A:   [200, True, 10, 1000]    # surface spectral weight
        tau: [2.0, True, 0.5, 10.0]  # IMFP (nm); start near expected value

# ----------------------------------------------------------------------------
# Band bending depth profile (applied to GLP_01_x0)
# Physical meaning: the core level binding energy shifts with depth due to the
# built-in electric field at the semiconductor surface. The linear dependence
# is an approximation; the magnitude is exaggerated here to clearly illustrate
# the effect in the data.
# x0(z) = x0_surface + GLP_01_x0_pLinear_01_m * z + GLP_01_x0_pLinear_01_b
#   pLinear_01_m < 0  ->  higher BE near surface (upward band bending for n-type)
#   pLinear_01_b = 0  ->  profile is a pure shift relative to the surface value
#
# GLP_01_x0_pLinear_01_m is made time-dependent in the 2D model
# (BandBendingRecovery in models_time.yaml).
# ----------------------------------------------------------------------------
GLP_01_x0:
    pLinear:
        m: [-0.5, True, -2, 2]   # band bending gradient (eV/nm)
        b: [0.0, False, -1.0, 1.0]    # intercept offset (fixed at 0)
