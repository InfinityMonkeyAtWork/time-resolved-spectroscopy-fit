# Two competing baseline models and two competing SbS models on the same data.
# We deliberately make A and B differ in only one structural choice so the
# comparison metrics (chi2_red / r2 / AIC / BIC) have something meaningful to say.

# ---- Baseline pair ---------------------------------------------------------
# baseA: full GLP profile (Gaussian-Lorentzian product). The simulated data
# was generated with a GLP, so this is the "right" model.
baseA:
    LinBack:
      m: [1E-2, True, -1, 1]
      b: [0, True, -5, 5]
      xStart: [0, False]
      xStop: [20, False]
    GLP:
      A: [12, True, 5, 15]
      x0: [8, True, 5, 15]
      F: [1.5, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]

# baseB: Gaussian only (GLP with the Lorentzian mixing m pinned to 0). One
# fewer free parameter, but a worse fit on data that has Lorentzian tails;
# AIC/BIC are designed to flag exactly this kind of structural underfit.
baseB:
    LinBack:
      m: [1E-2, True, -1, 1]
      b: [0, True, -5, 5]
      xStart: [0, False]
      xStop: [20, False]
    GLP:
      A: [12, True, 5, 15]
      x0: [8, True, 5, 15]
      F: [1.5, True, 0.75, 2.5]
      m: [0, False, 0, 1]

# ---- Slice-by-Slice pair ---------------------------------------------------
# sbsA: only the peak position x0 evolves with time (the truth in the
# simulated data). Background and amplitude pinned from the baseline fit.
sbsA:
    LinBack:
      m: [1E-2, False, -1, 1]
      b: [0, False, -5, 5]
      xStart: [0, False]
      xStop: [20, False]
    GLP:
      A: [12, False, 5, 15]
      x0: [8, True, 5, 15]
      F: [1.5, False, 0.75, 2.5]
      m: [0.3, False, 0, 1]

# sbsB: x0 AND A both vary per slice. More flexible (lower chi2_red on most
# slices) but pays for an extra free parameter in AIC/BIC.
sbsB:
    LinBack:
      m: [1E-2, False, -1, 1]
      b: [0, False, -5, 5]
      xStart: [0, False]
      xStop: [20, False]
    GLP:
      A: [12, True, 5, 15]
      x0: [8, True, 5, 15]
      F: [1.5, False, 0.75, 2.5]
      m: [0.3, False, 0, 1]

# ---- 2D pair ---------------------------------------------------------------
# m2dA / m2dB share an identical energy model (LinBack + GLP, all pinned from
# baseline). They differ only in which dynamics model gets attached to x0
# via `file.add_time_dependence(...)`:
#   m2dA -> MonoExpPosIRF  (exponential rise convolved with a Gaussian IRF)
#   m2dB -> MonoExpPos     (sharp exponential rise, no IRF)
# The simulated data was generated with an IRF-smeared rise, so we expect
# m2dA to win even after AIC/BIC penalize its extra free parameter (the IRF σ).
m2dA:
    LinBack:
      m: [1E-2, False, -1, 1]
      b: [0, False, -5, 5]
      xStart: [0, False]
      xStop: [20, False]
    GLP:
      A: [12, False, 5, 15]
      x0: [8, True, 5, 15]
      F: [1.5, False, 0.75, 2.5]
      m: [0.3, False, 0, 1]

m2dB:
    LinBack:
      m: [1E-2, False, -1, 1]
      b: [0, False, -5, 5]
      xStart: [0, False]
      xStop: [20, False]
    GLP:
      A: [12, False, 5, 15]
      x0: [8, True, 5, 15]
      F: [1.5, False, 0.75, 2.5]
      m: [0.3, False, 0, 1]
