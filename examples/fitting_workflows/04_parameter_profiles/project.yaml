# Project configuration for the parameter-profiles example
# (time-resolved XPS depth profiling)

# Display settings (general verbosity)
show_output: 1  # 0: silent/API mode, 1: interactive/notebook mode

# Auto-export side effects (CSV/PNG written at fit completion) are off here so
# this notebook produces no surprise files on disk. Saving, loading, and
# exporting fits is the subject of the 11_save_load_export notebook; MCMC
# uncertainty estimation lives in 12_uncertainty_mcmc.
auto_export: False

# Axis labels
e_label: 'Binding energy (eV)'  # x -> energy
t_label: 'Time (ps)'            # y -> time
z_label: 'Intensity (arb. units)'  # z -> intensity

# Plot settings
x_dir: 'rev'  # rev(erse): XPS convention plots high binding energy on the left
x_type: 'lin'  # lin or log
y_dir: 'def'  # def(ault) or rev(erse)
y_type: 'lin'  # lin or log
z_colormap: 'YlOrRd'  # colormap in 2D plots
z_type: 'lin'  # lin or log (2D plots)
dpi_plt: 100  # figure display dpi
dpi_save: 300  # figure save dpi
res_mult: 5  # residual multiplier in figures
