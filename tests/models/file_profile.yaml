# load these models in test_model_parser.py to unit test loading profile yaml models

# pExpDecay profile for an amplitude parameter
profile_pExpDecay:
    pExpDecay:
        A:   [200, True, 10, 1000]
        tau: [2.0, True, 0.5, 10.0]

# pLinear profile for a position parameter
profile_pLinear:
    pLinear:
        m: [-0.5, True, -2, 2]
        b: [0.0, False, -1.0, 1.0]

# pGauss profile for an amplitude parameter (centered on the test aux axis)
profile_pGauss:
    pGauss:
        A:  [3.0, True, 0.5, 10]
        x0: [2.0, True, 0, 4]
        SD: [1.5, True, 0.5, 5]

# fully-fixed profile: attached to a pinned parameter it makes the profiled
# op constant, exercising the compile-time constant-op path in schedule_2d
profile_pExpDecayFixed:
    pExpDecay:
        A:   [200, False]
        tau: [2.0, False]

# round-trip test profiles (moderate values for reliable convergence)

# linear shift of x0 over depth: x0(z) = 0.5*z, max shift 2.0 eV
roundtrip_pLinear_x0:
    pLinear:
        m: [0.5, True, -1, 1]
        b: [0.0, False, -1.0, 1.0]

# exponential decay of amplitude over depth: A(z) = 10*exp(-z/4)
roundtrip_pExpDecay_A:
    pExpDecay:
        A:   [10.0, True, 1, 30]
        tau: [4.0, True, 2.0, 10.0]
