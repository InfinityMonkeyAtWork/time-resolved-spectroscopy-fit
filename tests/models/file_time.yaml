#
# use this model to add time-dependence to a parameter in a 2D model
# (available functions info: /src/trspecfit/functions/time.py)
#

#model_name:
#    function1:
#        parameter1: [initial guess, vary?, lower boundary, upper boundary]
#        parameter2: [initial guess, vary?, lower boundary, upper boundary]
#        parameter3: ["expression"] # if parameter depends on other parameters
#        ...
#    function2:
#        ...

IRF:
    # define Gauss to convolve everything with 
    # (instrumental response function)
    gaussCONV:
        SD: [5.0E-2, True, 0, 1]
             
MonoExpPos:
    # expFun(t, A, tau, t0)
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]

# stronger amplitude for profile round-trip tests (~20% modulation)
MonoExpPosStrong:
    expFun:
        A: [2, True, 0, 10]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]

MonoExpNeg:
    # expFun(t, A, tau, t0)
    expFun:
        A: [-1, True, -5, 0]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]

MonoStep:
    # stepFun(t, A, t0)
    stepFun:
        A: [1.5, True, 0, 5]
        t0: [0, False, 0, 1]

MonoSin:
    # sinFun(t, A, f, phi, t0)
    # phi initialized nonzero (with t0=0) so a phi/t0 ordering bug in the
    # lowered path diverges from the interpreter even at initial theta.
    sinFun:
        A: [1, True, 0, 5]
        f: [0.05, True, 0.01, 0.2]
        phi: [0.3, True, -3.15, 3.15]
        t0: [0, False, 0, 1]

MonoLin:
    # linFun(t, m, t0)
    linFun:
        m: [0.02, True, -1, 1]
        t0: [0, False, 0, 1]

MonoSinDivX:
    # sinDivX(t, A, f, t0)
    sinDivX:
        A: [1, True, 0, 5]
        f: [0.05, True, 0.01, 0.2]
        t0: [0, False, 0, 1]

MonoErf:
    # erfFun(t, A, SD, t0)
    erfFun:
        A: [1, True, 0, 5]
        SD: [5, True, 1, 20]
        t0: [20, False, 0, 50]

MonoSqrt:
    # sqrtFun(t, A, t0)
    sqrtFun:
        A: [0.2, True, 0, 5]
        t0: [0, False, 0, 1]

# SD ~ 0.8*dt of the shared test time axis: wide enough that the width is
# identifiable from the data, narrow enough not to bury the expFun dynamics
MonoExpPosIRF:
    gaussCONV:
        SD: [0.4, True, 0, 1]
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]

# sub-sample IRF: SD sits far below the shared test time steps, so the
# kernel is numerically a delta and SD is not identifiable from the data.
# Use as the far-below-truth fit init in kernel-support tests, never as a
# recovery target.
MonoExpPosIRFNarrow:
    gaussCONV:
        SD: [5.0E-2, True, 0, 1]
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]

MonoExpPosLorentzIRF:
    lorentzCONV:
        W: [0.5, True, 0.01, 5]
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]

MonoExpPosVoigtIRF:
    voigtCONV:
        SD: [0.1, True, 0.01, 1]
        W: [0.1, True, 0.01, 1]
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]

MonoExpPosExpSymIRF:
    expSymCONV:
        tau: [1.0, True, 0.1, 10]
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]

MonoExpPosExpDecayIRF:
    expDecayCONV:
        tau: [1.0, True, 0.1, 10]
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]

MonoExpPosExpRiseIRF:
    expRiseCONV:
        tau: [1.0, True, 0.1, 10]
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]

MonoExpPosBoxIRF:
    boxCONV:
        width: [2.0, True, 0.1, 20]
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]

# Empty subcycle placeholder (applies to all times in multi-cycle)
ModelNone:
    none: {}

# Multi-cycle subcycle with expressions referencing MonoExpNeg's parameters.
# expFun here gets renumbered to expFun_02 (MonoExpNeg's expFun is expFun_01).
# Expressions reference expFun_01 params and get auto-prefixed with par_name.
MonoExpPosExpr:
    expFun:
        A: ["-expFun_01_A"]
        tau: ["expFun_01_tau"]
        t0: [0, False, 0, 1]

# Bi-exponential: two expFun, second shares t0 with first via expression.
# Single-cycle, no convolution -- fully lowerable.
BiExpSharedT0:
    expFun:
        A: [3, True, 0, 10]
        tau: [5, True, 1, 20]
        t0: [0, False, 0, 1]
    expFun:
        A: [-1, True, -5, 0]
        tau: [20, True, 5, 50]
        t0: ["expFun_01_t0"]

# convolution as last component (should fail ordering validation)
conv_last:
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]
    gaussCONV:
        SD: [5.0E-2, True, 0, 1]