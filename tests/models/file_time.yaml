#
# use this model to add time-dependence to a parameter in a 2D model
# (available functions info: /src/trspecfit/functions/time.py)
#

#model_name:
#    function1:
#        parameter1: [initial guess, vary?, lower boundary, upper boundary]
#        parameter2: [initial guess, vary?, lower boundary, upper boundary]
#        parameter3: ["expression"] # if parameter depends on other parameters
#        ...
#    function2:
#        ...

IRF:
    # define Gauss to convolve everything with 
    # (instrumental response function)
    gaussCONV:
        SD: [5.0E-2, True, 0, 1]
             
MonoExpPos:
    # expFun(t, A, tau, t0, y0)
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]
        y0: [0, False, 0, 1]

# stronger amplitude for profile round-trip tests (~20% modulation)
MonoExpPosStrong:
    expFun:
        A: [2, True, 0, 10]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]
        y0: [0, False, 0, 1]

MonoExpNeg:
    # expFun(t, A, tau, t0, y0)
    expFun:
        A: [-1, True, -5, 0]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]
        y0: [0, False, 0, 1]

MonoExpPosIRF:
    gaussCONV:
        SD: [5.0E-2, True, 0, 1]
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]
        y0: [0, False, 0, 1]

# Empty subcycle placeholder (applies to all times in multi-cycle)
ModelNone:
    none: {}

# Multi-cycle subcycle with expressions referencing MonoExpNeg's parameters.
# expFun here gets renumbered to expFun_02 (MonoExpNeg's expFun is expFun_01).
# Expressions reference expFun_01 params and get auto-prefixed with par_name.
MonoExpPosExpr:
    expFun:
        A: ["-expFun_01_A"]
        tau: ["expFun_01_tau"]
        t0: [0, False, 0, 1]
        y0: [0, False, 0, 1]

# Bi-exponential: two expFun, second shares t0 with first via expression.
# Single-cycle, no convolution -- fully lowerable.
BiExpSharedT0:
    expFun:
        A: [3, True, 0, 10]
        tau: [5, True, 1, 20]
        t0: [0, False, 0, 1]
        y0: [0, False, 0, 1]
    expFun:
        A: [-1, True, -5, 0]
        tau: [20, True, 5, 50]
        t0: ["expFun_01_t0"]
        y0: [0, False, 0, 1]

# convolution as last component (should fail ordering validation)
conv_last:
    expFun:
        A: [1, True, 0, 5]
        tau: [2.5, True, 1, 10]
        t0: [0, False, 0, 1]
        y0: [0, False, 0, 1]
    gaussCONV:
        SD: [5.0E-2, True, 0, 1]