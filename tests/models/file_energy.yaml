# load these models in test_model_parser.py to unit test loading user-defined yaml models

# simple energy model
simple_energy: 
    # define Offset (y0) parameter
    Offset:
      y0: [2, True, 0, 5]
    # define Shirley background
    Shirley:
      pShirley: [4.0E-4, False]
    # define peak type components 
    GLP:
      A: [20, True, 5, 25]
      x0: [84.5, True, 82, 88]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]
    GLP:
      A: [17, True, 5, 25]
      x0: [88.1, True]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]

# one peak depends on another peak (using expressions)
energy_expression: 
    # define Offset (y0) parameter
    Offset:
      y0: [2, True, 0, 5]
    # define Shirley background
    Shirley:
        pShirley: [4.0E-4, True, 1.0E-12, 1.0E-3]
    # define peak type components
    GLP:
      A: [20, True, 5, 25]
      x0: [84.5, True, 82, 88]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]
    GLP:
      A: ["3/4*GLP_01_A"]
      x0: ["GLP_01_x0 +3.6"]
      F: ["GLP_01_F"]
      m: ["GLP_01_m"]

# one peak depends on another peak that is referenced before it is defined (forward reference)
energy_expression_forward_reference:
    # define Offset (y0) parameter
    Offset:
      y0: [2, True, 0, 5]
    # define Shirley background
    Shirley:
        pShirley: [4.0E-4, True, 1.0E-12, 1.0E-3]
    # define peak type components
    GLP:
      A: ["3/4*GLP_02_A"]
      x0: ["GLP_02_x0 +3.6"]
      F: ["GLP_02_F"]
      m: ["GLP_02_m"]
    GLP:
      A: [20, True, 5, 25]
      x0: [84.5, True, 82, 88]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]


# fan-out: GLP_02 and GLP_03 both reference GLP_01 directly
expression_fan_out:
    Offset:
      y0: [2, True, 0, 5]
    GLP:
      A: [20, True, 5, 25]
      x0: [84.0, True, 82, 88]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]
    GLP:
      A: ["GLP_01_A * 0.5"]
      x0: ["GLP_01_x0 + 2.0"]
      F: ["GLP_01_F"]
      m: ["GLP_01_m"]
    GLP:
      A: ["GLP_01_A * 0.25"]
      x0: ["GLP_01_x0 + 4.0"]
      F: ["GLP_01_F"]
      m: ["GLP_01_m"]

# chain: GLP_01 → GLP_02 → GLP_03 (each references the previous)
expression_chain:
    Offset:
      y0: [2, True, 0, 5]
    GLP:
      A: [20, True, 5, 25]
      x0: [84.0, True, 82, 88]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]
    GLP:
      A: ["GLP_01_A * 0.5"]
      x0: ["GLP_01_x0 + 2.0"]
      F: ["GLP_01_F"]
      m: ["GLP_01_m"]
    GLP:
      A: ["GLP_02_A * 0.5"]
      x0: ["GLP_02_x0 + 2.0"]
      F: ["GLP_02_F"]
      m: ["GLP_02_m"]

# single Gauss peak (no background) — used for profile round-trip tests
# A fixed at 0; amplitude comes entirely from pExpDecay profile
single_gauss:
    Gauss:
      A: [0, False]
      x0: [85.0, True, 82, 88]
      SD: [1.0, True, 0.5, 3.0]

# single GLP peak (no background) — used for profile averaging tests
# GLP is linear in A, so averaging over aux_axis = evaluating at mean(A_eff)
single_glp:
    GLP:
      A: [20, True, 5, 25]
      x0: [85.0, True, 82, 88]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]

# two GLPs, GLP_02_A is expression of GLP_01_A — for profile+expression tests
# GLP is linear in A, so profile on GLP_01_A should propagate through expression
two_glp_expr_amplitude:
    GLP:
      A: [20, True, 5, 25]
      x0: [85.0, True, 82, 88]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]
    GLP:
      A: ["GLP_01_A * 0.5"]
      x0: [87.0, True, 82, 90]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]

# two GLPs: GLP_02_A references profiled GLP_01_A AND time-dep GLP_01_x0
# exercises mixed profile+dynamics in a single per-sample expression
two_glp_mixed_profile_dynamics:
    GLP:
      A: [20, True, 5, 25]
      x0: [85.0, True, 82, 88]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]
    GLP:
      A: ["GLP_01_A * GLP_01_x0 / 85"]
      x0: [87.0, True, 82, 90]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]

#
# all following models should fail
#

# wrong order of parameters (this is accepted — YAML dicts are unordered)
# m and F are swapped
wrong_order:
    Offset:
      y0: [2, True, 0, 5]
    GLP:
      A: [20, True, 5, 25]
      x0: [84.5, True, 82, 88]
      m: [0.3, True, 0, 1]
      F: [1.0, True, 0.75, 2.5]

# wrong parameter name (this should fail)
# q is supposed to be named m
wrong_parameter_name:
    Offset:
      y0: [2, True, 0, 5]
    GLP:
      A: [20, True, 5, 25]
      x0: [84.5, True, 82, 88]
      q: [0.3, True, 0, 1]
      F: [1.0, True, 0.75, 2.5]

# background as last component (should fail ordering validation)
background_last:
    GLP:
      A: [20, True, 5, 25]
      x0: [84.5, True, 82, 88]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]
    Offset:
      y0: [2, True, 0, 5]

# convolution in a top-level energy model (unsupported; IRF belongs in Dynamics)
energy_convolution_unsupported:
    gaussCONV:
      SD: [5.0E-2, True, 0, 1]
    GLP:
      A: [20, True, 5, 25]
      x0: [84.5, True, 82, 88]
      F: [1.0, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]

# Integer vary value — used to verify 0/1 are rejected by validation
# (Python 0 == False would pass the old set-membership check silently)
vary_int_bad:
    GLP:
      A: [20, 0, 5, 25]
      x0: [85.0, True, 82, 88]
      F: [1.0, False, 0.75, 2.5]
      m: [0.3, False, 0, 1]
